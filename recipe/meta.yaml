{% set name = "fakeredis" %}
{% set version = "2.34.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 4ff55606982972eecce3ab410e03d746c11fe5deda6381d913641fbd8865ea9b

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - redis-py >=4.3
    - sortedcontainers >=2.4.0,<3
    - typing-extensions >=4.7,<5

test:
  requires:
    - pip
  commands:
    - pip check
  imports:
    - fakeredis

about:
  home: https://github.com/cunla/fakeredis-py
  license_file: LICENSE
  license: BSD-3-Clause
  license_family: BSD
  summary: A cross-platform clipboard module for Python. (only handles plain text for now)
  description: |
    Pyperclip is a cross-platform Python module for copy and paste clipboard functions.
  dev_url: https://github.com/cunla/fakeredis-py
  doc_url: https://fakeredis.readthedocs.io

extra:
  recipe-maintainers:
    - viridianmelody
